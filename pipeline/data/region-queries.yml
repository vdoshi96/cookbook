# Curated image-search queries per region (Stage 9).
#
# Each region in /data/regions.json gets an ordered list of queries — the
# fetcher tries them in order, falling through to the next on no usable
# results. Bare region names alone return generic stock imagery, so the
# primary query is always anchored on a famous landmark / cultural scene.
#
# Composite regions (slash-separated, e.g. "Punjab/Awadh/Delhi") use the
# most distinctive component's imagery — typically Awadh's Lucknow
# architecture or Mughal Old Delhi, picked to differentiate from sibling
# composite regions.
#
# Edit this file to refine a region's hero image; no code changes needed.

